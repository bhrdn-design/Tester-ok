<!DOCTYPE html>

<head>

        .input-group input:focus { outline: none; border-color: #e5980a; background-color: rgba(255, 255, 255, 0.08); }
        .button-group { text-align: right; }
        button { color: #1b263b; background-color: #e5980a; font-family: Arial, sans-serif; font-weight: bold; border: none; padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 8px; transition: all 0.2s; } 
        button:hover { background-color: #fca311; transform: translateY(-1px); }
        .output-box { background: rgba(229, 152, 10, 0.1); border: 1px dashed #e5980a; border-radius: 8px; padding: 14px; margin: 22px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        p { color: #ffffff; font-size: 15px; font-family: 'Courier New', Courier, monospace; margin: 0; font-weight: bold; line-height: 1.5; }
        .footer { font-size: 12px; color: #8d99ae; font-weight: bold; margin-top: 30px; border-top: 1px dashed rgba(255, 255, 255, 0.1); padding-top: 18px; }
    </style>
</head>
